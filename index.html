<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>DareBear Mode</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #241047, #050008 70%);
    font-family: Arial, sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .stage {
    display: flex;
    align-items: center;
    gap: 45px;
  }

  img {
    max-height: 560px;
    max-width: 48vw;
    animation: pulse 1.7s infinite alternate;
    filter:
      drop-shadow(0 0 25px #00ffe1)
      drop-shadow(0 0 50px #a600ff);
  }

  .bubble {
    width: 500px;
    background: rgba(255,255,255,.96);
    color: #20113d;
    padding: 28px 34px;
    border-radius: 30px;
    font-size: 30px;
    font-weight: bold;
    line-height: 1.35;
    text-align: center;
    box-shadow:
      0 0 25px #00ffe0,
      0 0 60px #6a00ff;
    position: relative;
  }

  .bubble:before {
    content: "";
    position: absolute;
    left: -24px;
    top: 50%;
    transform: translateY(-50%);
    border-width: 18px 24px 18px 0;
    border-style: solid;
    border-color: transparent rgba(255,255,255,.96) transparent transparent;
  }

  @keyframes pulse {
    from { transform: scale(1); }
    to { transform: scale(1.045); }
  }
</style>
</head>

<body>
  <div class="stage">
    <img src="logo.png" alt="DareBear Logo">

    <div class="bubble">
      Welcome Darren.<br>
      Bass Levels: Nominal<br>
      Vibes Detected<br>
      ENTER THE BEAR DEN
    </div>
  </div>
</body>
</html>
