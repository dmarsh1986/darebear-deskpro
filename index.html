<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8" />
<title>DareBear Mode</title>

<style>
  body {
    margin: 0;
    height: 100vh;
    background: radial-gradient(circle, #241047, #050008 70%);
    color: white;
    font-family: Arial, sans-serif;
    overflow: hidden;
    display: flex;
    align-items: center;
    justify-content: center;
  }

  .wrap {
    position: relative;
    text-align: center;
    margin-top: 120px;
  }

  .bubble {
    position: absolute;
    top: -155px;
    left: 50%;
    transform: translateX(-50%);
    width: 560px;
    background: rgba(255,255,255,.96);
    color: #20113d;
    padding: 22px 28px;
    border-radius: 30px;
    font-size: 30px;
    font-weight: bold;
    line-height: 1.35;
    box-shadow:
      0 0 25px #00ffe0,
      0 0 60px #6a00ff;
    z-index: 100;
  }

  .bubble:after {
    content: "";
    position: absolute;
    bottom: -20px;
    left: 50%;
    margin-left: -18px;
    border-width: 20px 18px 0 18px;
    border-style: solid;
    border-color: rgba(255,255,255,.96) transparent transparent transparent;
  }

  img {
    max-height: 470px;
    max-width: 80vw;
    animation: pulse 1.7s infinite alternate;
    filter:
      drop-shadow(0 0 25px #00ffe1)
      drop-shadow(0 0 50px #a600ff);
  }

  @keyframes pulse {
    from {
      transform: scale(1);
      filter:
        drop-shadow(0 0 20px #00ffe1)
        drop-shadow(0 0 40px #a600ff);
    }

    to {
      transform: scale(1.05);
      filter:
        drop-shadow(0 0 35px #00ffe1)
        drop-shadow(0 0 75px #a600ff);
    }
  }
</style>
</head>

<body>
  <div class="wrap">
    <div class="bubble">
      Welcome Darren.<br>
      Bass Levels: Nominal<br>
      Vibes Detected<br>
      ENTER THE BEAR DEN
    </div>

    <img src="logo.png" alt="DareBear Logo">
  </div>
</body>
</html>
